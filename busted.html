<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000; color: #fff; width: 100%; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; font-family: 'Press Start 2P', monospace; overflow: hidden;
    }
    #scene {
      display: flex; flex-direction: column; align-items: center;
      gap: 32px; padding: 40px 24px; max-width: 600px; width: 100%;
      opacity: 0; transition: opacity 0.8s ease;
    }
    #scene.visible { opacity: 1; }
    #portrait {
      width: 220px; height: auto; image-rendering: pixelated; display: block;
      cursor: pointer;
      transition: filter 0.1s;
    }
    /* Her tıklamada kısa bir "shake" efekti */
    #portrait.hit { filter: brightness(3); }
    #textbox {
      width: 100%; border: 3px solid #fff; padding: 20px 24px 20px 20px;
      position: relative; min-height: 110px; background: #000;
    }
    #speaker { font-size: 9px; color: #fff; margin-bottom: 12px; letter-spacing: 0.05em; }
    #dialogue { font-size: 9px; line-height: 2; color: #fff; white-space: pre-wrap; min-height: 54px; }
    #cursor {
      display: inline-block; width: 10px; height: 10px; background: #fff;
      margin-left: 2px; vertical-align: middle;
      animation: blink 0.6s step-end infinite; opacity: 0;
    }
    #cursor.active { opacity: 1; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    #next-arrow {
      position: absolute; bottom: 10px; right: 14px; font-size: 9px; color: #fff;
      animation: bounce 0.5s ease-in-out infinite alternate; display: none;
    }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(4px); } }
    #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 9999; }
    #flash.on { opacity: 1; pointer-events: all; }
    /* Fotoğrafa tıklama sayacı göstergesi */
    #poke-hint {
      font-size: 6px; color: #444; margin-top: -20px;
      letter-spacing: 0.05em; display: none;
    }
  </style>
</head>

    function b64ToArrayBuffer(b64) {
      var bin = atob(b64), bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes.buffer;
    }

    function initAudio(callback) {
      if (audioCtx) { if (callback) callback(); return; }
      audioCtx = new AudioCtx();
      var loaded = 0;
      function onLoad() { if (++loaded === 2 && callback) callback(); }
      audioCtx.decodeAudioData(b64ToArrayBuffer(ASGORE_B64), function(b){ voiceBuffer=b; onLoad(); }, onLoad);
      audioCtx.decodeAudioData(b64ToArrayBuffer(ROAR_B64),   function(b){ roarBuffer=b;  onLoad(); }, onLoad);
    }

    function playBuffer(buffer, volume) {
      if (!audioCtx || !buffer) return;
      var src = audioCtx.createBufferSource();
      var gain = audioCtx.createGain();
      src.buffer = buffer;
      gain.gain.setValueAtTime(volume || 0.7, audioCtx.currentTime);
      src.connect(gain); gain.connect(audioCtx.destination);
      src.start(audioCtx.currentTime);
    }

    function playAsgoreBeep() { playBuffer(voiceBuffer, 0.6); }

    function playRoarThenDo(callback) {
      playBuffer(roarBuffer, 0.9);
      setTimeout(callback, 800);
    }

    // ── Müzik fade-out ────────────────────────────────────────────────────
    function fadeMusicOut(duration) {
      if (fadeTimer) return;
      var steps = 40, interval = duration / steps, decrement = bgm.volume / steps;
      fadeTimer = setInterval(function() {
        if (bgm.volume > decrement) {
          bgm.volume = Math.max(0, bgm.volume - decrement);
        } else {
          bgm.volume = 0; bgm.pause(); clearInterval(fadeTimer);
        }
      }, interval);
    }

    // ── Yazma motoru ──────────────────────────────────────────────────────
    var CHAR_DELAY = 38;

    function typeLine(text, onDone) {
      typing = true;
      cursorEl.classList.remove("active");
      arrowEl.style.display = "none";
      dialogueEl.textContent = "";
      charIndex = 0;

      function typeChar() {
        if (charIndex < text.length) {
          var ch = text[charIndex];
          dialogueEl.textContent += ch;
          if (ch !== " " && ch !== "\n") playAsgoreBeep();
          charIndex++;
          typingTimer = setTimeout(typeChar, CHAR_DELAY);
        } else {
          typing = false;
          cursorEl.classList.add("active");
          arrowEl.style.display = "block";
          if (onDone) onDone();
        }
      }
      typeChar();
    }

    // ── Taciz akışı ───────────────────────────────────────────────────────
    function startTacizFlow() {
      tacizMode = true;
      tacizIndex = 0;
      tacizFinished = false;

      // Ana diyaloğu durdur
      clearTimeout(typingTimer);
      typing = false;

      // Müziği kapat
      if (!fadeTimer) fadeMusicOut(1500);

      typeLine(tacizLines[tacizIndex], function() {
        tacizIndex++;
        if (tacizIndex >= tacizLines.length) tacizFinished = true;
      });
    }

    function advanceTaciz() {
      if (typing) {
        clearTimeout(typingTimer);
        dialogueEl.textContent = tacizLines[tacizIndex];
        typing = false;
        cursorEl.classList.add("active");
        arrowEl.style.display = "block";
        tacizIndex++;
        if (tacizIndex >= tacizLines.length) tacizFinished = true;
        return;
      }
      if (tacizFinished) {
        // Roar + flash + taciz.html'e yönlendir
        document.removeEventListener("click", handleClick);
        document.removeEventListener("keydown", keyHandler);
        playRoarThenDo(function() {
          flash.classList.add("on");
          setTimeout(function() {
            window.location.replace("taciz.html");
          }, 150);
        });
        return;
      }
      if (tacizIndex < tacizLines.length) {
        typeLine(tacizLines[tacizIndex], function() {
          tacizIndex++;
          if (tacizIndex >= tacizLines.length) tacizFinished = true;
        });
      }
    }

    // ── Ana diyalog akışı ─────────────────────────────────────────────────
    function advanceMain() {
      if (typing) {
        clearTimeout(typingTimer);
        dialogueEl.textContent = lines[lineIndex];
        typing = false;
        cursorEl.classList.add("active");
        arrowEl.style.display = "block";
        if (lineIndex >= lines.length - 1) finished = true;
        if (lineIndex >= FADEOUT_FROM_LINE && bgm.volume > 0 && !fadeTimer) fadeMusicOut(2000);
        return;
      }
      if (finished) {
        document.removeEventListener("click", handleClick);
        document.removeEventListener("keydown", keyHandler);
        playRoarThenDo(function() {
          flash.classList.add("on");
          setTimeout(function() {
            window.location.replace("https://www.youtube.com/watch?v=QDia3e12czc");
          }, 150);
        });
        return;
      }
      if (lineIndex < lines.length - 1) {
        lineIndex++;
        arrowEl.style.display = "none";
        if (lineIndex >= FADEOUT_FROM_LINE && bgm.volume > 0 && !fadeTimer) fadeMusicOut(2000);
        typeLine(lines[lineIndex], function() {
          if (lineIndex >= lines.length - 1) finished = true;
        });
      }
    }

    // ── Fotoğrafa tıklama ─────────────────────────────────────────────────
    portrait.addEventListener("click", function(e) {
      e.stopPropagation(); // textbox tıklamasını tetiklemesin
      if (tacizMode || !audioReady) return;

      // Flash efekti
      portrait.classList.add("hit");
      setTimeout(function() { portrait.classList.remove("hit"); }, 120);

      pokeCount++;
      if (pokeCount >= 3) {
        startTacizFlow();
      }
    });

    // ── Genel tıklama / tuş yöneticisi ───────────────────────────────────
    function handleClick(e) {
      // Fotoğrafa tıklama portrait listener'ı hallediyor
      if (e.target === portrait) return;
      if (tacizMode) { advanceTaciz(); } else { advanceMain(); }
    }

    function keyHandler(e) {
      if (e.key === "Enter" || e.key === " " || e.key === "z" || e.key === "Z") {
        if (tacizMode) advanceTaciz(); else advanceMain();
      }
    }

    // ── İlk etkileşim: AudioContext + BGM ────────────────────────────────
    function firstInteraction() {
      document.removeEventListener("click", firstInteraction);
      document.removeEventListener("keydown", firstInteraction);

      bgm.volume = 0.7;
      bgm.play().catch(function(){});

      initAudio(function() {
        audioReady = true;
        document.addEventListener("click", handleClick);
        document.addEventListener("keydown", keyHandler);
        if (!typing && lineIndex === 0 && dialogueEl.textContent === "") {
          typeLine(lines[0], function(){});
        }
      });
    }

    document.addEventListener("click", firstInteraction);
    document.addEventListener("keydown", firstInteraction);

    // ── Sayfa yüklenince sessiz ilk satır ─────────────────────────────────
    window.addEventListener("load", function() {
      setTimeout(function() {
        scene.classList.add("visible");
        setTimeout(function() {
          typing = true;
          cursorEl.classList.remove("active");
          arrowEl.style.display = "none";
          dialogueEl.textContent = "";
          charIndex = 0;
          var text = lines[0];
          function silentType() {
            if (charIndex < text.length) {
              dialogueEl.textContent += text[charIndex++];
              typingTimer = setTimeout(silentType, CHAR_DELAY);
            } else {
              typing = false;
              cursorEl.classList.add("active");
              arrowEl.style.display = "block";
            }
          }
          silentType();
        }, 400);
      }, 300);
    });
  </script>
