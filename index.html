<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  height: 100%;
}

/* ASCII’yi merkeze sabitle */
body {
  display: flex;
  justify-content: center;
  align-items: center;

  /* kritik: mobil zoom / font scaling’i sabitle */
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* tüm ASCII output’u zorla stabilize et */
* {
  font-family: "Courier New", monospace !important;
  white-space: pre !important;
  line-height: 1 !important;
  font-size: 14px !important;
}

/* taşmayı tamamen engelle */
body > * {
  max-width: 100vw;
  max-height: 100vh;
  overflow: hidden;
}
</style>
</head>

<body>

<script src="https://www.qqpr.com/ascii/js/1021.js"></script>

</body>
</html>
