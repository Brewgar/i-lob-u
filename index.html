<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>I Love You SO SO MUCH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #FF6F91;
      color: #fff;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Lucida Console", "Courier New", monospace;
    }
    .lock-box {
      border: 2px solid rgba(255,255,255,0.5);
      padding: 36px 40px;
      text-align: center;
      max-width: 340px;
      width: 90%;
    }
    .lock-ascii {
      font-size: 11px;
      line-height: 1.3;
      white-space: pre;
      color: rgba(255,255,255,0.85);
      margin-bottom: 20px;
      display: block;
    }
    .lock-title { font-size: 13px; color: rgba(255,255,255,0.9); margin-bottom: 6px; letter-spacing: 0.05em; }
    .lock-sub   { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 22px; }
    #pw-input {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid rgba(255,255,255,0.6);
      color: #fff;
      font-family: "Lucida Console", "Courier New", monospace;
      font-size: 14px;
      width: 100%;
      text-align: center;
      padding: 6px 0;
      outline: none;
      letter-spacing: 0.1em;
    }
    #pw-input::placeholder { color: rgba(255,255,255,0.35); letter-spacing: 0.05em; }
    #pw-input:focus { border-bottom-color: #fff; }
    #pw-btn {
      margin-top: 18px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.6);
      color: #fff;
      font-family: "Lucida Console", "Courier New", monospace;
      font-size: 12px;
      padding: 8px 28px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.15s, border-color 0.15s;
    }
    #pw-btn:hover  { background: rgba(255,255,255,0.15); border-color: #fff; }
    #pw-btn:active { background: rgba(255,255,255,0.25); }
    #pw-error {
      margin-top: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.0);
      transition: color 0.2s;
      min-height: 16px;
    }
    #pw-error.show { color: rgba(255,255,255,0.85); }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>

<!-- password: 12345 -->

  <div class="lock-box" id="lock-box">
    <span class="lock-ascii">+-------+
|  (^_^)|
| &lt;3 &lt;3 |
+-------+</span>
    <p class="lock-title">bu siteye girmek için</p>
    <p class="lock-sub">şifreyi bilmen lazım :3</p>
    <input type="password" id="pw-input" placeholder="••••••••••••" autocomplete="off" spellcheck="false" />
    <br>
    <button id="pw-btn" onclick="checkPassword()">gir →</button>
    <p id="pw-error">yanlış şifre :c tekrar dene</p>
  </div>

  <script>
    // password: 12345
    const CORRECT = "e8b877bd637cee95dddddf48c47d8a16e722065aed2f88492cfd6f749b8c72b6";
    const TRAP    = "5994471abb01112afcc18159f6cc74b4f511b99806da59b3caf5a9c173cacfc5";

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    async function checkPassword() {
      const val = document.getElementById("pw-input").value;
      const hash = await sha256(val);

      if (hash === CORRECT) {
        sessionStorage.setItem("unlocked", "true");
        window.location.href = "main.html";
      } else if (hash === TRAP) {
        window.location.href = "busted.html";
      } else {
        const box = document.getElementById("lock-box");
        const err = document.getElementById("pw-error");
        box.classList.remove("shake");
        void box.offsetWidth;
        box.classList.add("shake");
        err.classList.add("show");
        document.getElementById("pw-input").value = "";
      }
    }

    document.getElementById("pw-input").addEventListener("keydown", e => {
      if (e.key === "Enter") checkPassword();
    });
  </script>
</body>
</html>
