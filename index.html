<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Art</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #ascii-target {
      font-family: monospace;
      font-size: clamp(6px, 1.4vw, 13px);
      line-height: 1.2;
      color: #fff;
      white-space: pre;
      text-align: center;
      max-width: 100vw;
    }

    @media (max-width: 480px) {
      #ascii-target {
        font-size: 5px;
        line-height: 1.1;
      }
    }
  </style>
</head>
<body>
  <div id="ascii-target"></div>
  <script src="http://www.qqpr.com/ascii/js/1021.js"></script>
</body>
</html>
